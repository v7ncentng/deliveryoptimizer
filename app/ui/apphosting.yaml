runConfig:
  runtime: nodejs20
  memoryMiB: 512
  concurrency: 100
  minInstances: 0
  maxInstances: 4

env:
  - variable: NEXT_PUBLIC_GOOGLE_MAPS_KEY
    secret: GOOGLE_MAPS_KEY
  - variable: NEXT_PUBLIC_GOOGLE_MAPS_MAP_ID
    secret: GOOGLE_MAPS_MAP_ID
  - variable: DELIVERYOPTIMIZER_API_URL
    secret: DELIVERYOPTIMIZER_API_URL
    availability:
      - BUILD
      - RUNTIME
  - variable: FEEDBACK_ENABLED
    value: "1"
  - variable: FEEDBACK_GITHUB_REPO
    secret: FEEDBACK_GITHUB_REPO
  - variable: FEEDBACK_GITHUB_APP_ID
    secret: FEEDBACK_GITHUB_APP_ID
  - variable: FEEDBACK_GITHUB_INSTALLATION_ID
    secret: FEEDBACK_GITHUB_INSTALLATION_ID
  - variable: FEEDBACK_GITHUB_PRIVATE_KEY
    secret: FEEDBACK_GITHUB_PRIVATE_KEY
  - variable: FEEDBACK_SCREENSHOT_BUCKET
    secret: FEEDBACK_SCREENSHOT_BUCKET
  - variable: NEXT_PUBLIC_FEEDBACK_RECAPTCHA_SITE_KEY
    secret: FEEDBACK_RECAPTCHA_SITE_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: FEEDBACK_RECAPTCHA_SECRET
    secret: FEEDBACK_RECAPTCHA_SECRET
  - variable: FEEDBACK_RECAPTCHA_MIN_SCORE
    value: "0.5"
  - variable: FEEDBACK_RATE_LIMIT_WINDOW_MS
    value: "600000"
  - variable: FEEDBACK_RATE_LIMIT_MAX
    value: "5"
  - variable: FEEDBACK_DAILY_SHUTDOWN_THRESHOLD
    value: "100"
