substitutions:
  _REGION: us-east1
  _OSRM_BUCKET: b2-delivery-optimizer-osrm-data

steps:
  # Build and push API image
  - name: gcr.io/cloud-builders/docker
    id: build-api
    env: ['DOCKER_BUILDKIT=1']
    args:
      - build
      - --cache-from
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/services/deliveryoptimizer-api:cache
      - -f
      - deploy/services/http-server.Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/services/deliveryoptimizer-api:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/services/deliveryoptimizer-api:latest
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/services/deliveryoptimizer-api:cache
      - .

  # Build and push OSRM image
  - name: gcr.io/cloud-builders/docker
    id: build-osrm
    waitFor: ['-']  # run in parallel with build-api
    env: ['DOCKER_BUILDKIT=1']
    args:
      - build
      - --cache-from
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/services/osrm:cache
      - -f
      - deploy/services/osrm.Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/services/osrm:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/services/osrm:latest
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/services/osrm:cache
      - .

  # Push API images
  - name: gcr.io/cloud-builders/docker
    id: push-api
    waitFor: [build-api]
    args: [push, --all-tags, ${_REGION}-docker.pkg.dev/$PROJECT_ID/services/deliveryoptimizer-api]

  # Push OSRM images
  - name: gcr.io/cloud-builders/docker
    id: push-osrm
    waitFor: [build-osrm]
    args: [push, --all-tags, ${_REGION}-docker.pkg.dev/$PROJECT_ID/services/osrm]

  # Deploy sidecar service to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    waitFor: [push-api, push-osrm]
    entrypoint: bash
    args:
      - -c
      - |
        sed \
          -e "s|:TAG|:$COMMIT_SHA|g" \
          -e "s|REGISTRY|${_REGION}-docker.pkg.dev/$PROJECT_ID/services|g" \
          -e "s|SERVICE_ACCOUNT|do-app-service@$PROJECT_ID.iam.gserviceaccount.com|g" \
          -e "s|OSRM_BUCKET|${_OSRM_BUCKET}|g" \
          infra/cloud-run/service.yaml \
          | gcloud run services replace - \
              --region ${_REGION} \
              --project $PROJECT_ID
        gcloud run services add-iam-policy-binding deliveryoptimizer \
          --region ${_REGION} \
          --member="serviceAccount:firebase-app-hosting-compute@$PROJECT_ID.iam.gserviceaccount.com" \
          --role="roles/run.invoker" \
          --project $PROJECT_ID \
          --quiet

serviceAccount: projects/$PROJECT_ID/serviceAccounts/do-app-service@$PROJECT_ID.iam.gserviceaccount.com

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8  # C++ build needs more CPU

timeout: 3600s  # 60 min — C++ build can take 15-20 min uncached
